<h2 class="text-2xl font-bold">Agendamentos</h2>

<div class="flex flex-wrap">
  @for (item of agendamentos(); track $index) {
    <p-card class="w-64 m-4 border border-neutral-400 text-sm">
      <p>
        <i class="pi pi-clock"></i>
        {{ item.dataHoraInicio | date: 'dd/MM' }}
        {{ item.dataHoraInicio | date: 'HH:mm' }}
      </p>
      <p>
        <i class="pi pi-user"></i>
        {{ item.descricaoProfissional }}
      </p>
      <p>
        <i class="pi pi-tag"></i>
        {{ item.descricaoServico }}
      </p>
    </p-card>
  }
</div>
